<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- Header -->
  <header class="bg-success text-white text-center py-5 mb-4">
    <h1 class="display-4 fw-bold">Contact Us</h1>
    <p class="lead">We would love to hear from you!</p>
  </header>

  <div class="container">

    <!-- Contact Info Section -->
    <div class="card mb-4 shadow-sm">
      <div class="card-body">
        <h2 class="card-title mb-3">Our Information</h2>
        <p><strong>Address:</strong> 123 Main Street, Cairo, Egypt</p>
        <p><strong>Email:</strong> contact@example.com</p>
        <p><strong>Phone:</strong> +20 123 456 7890</p>
      </div>
    </div>

    <!-- Contact Form Section -->
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="card-title mb-4">Send Us a Message</h2>
        <form>
          <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" placeholder="Your Name">
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="Your Email">
          </div>
          <div class="mb-3">
            <label for="message" class="form-label">Message</label>
            <textarea class="form-control" id="message" rows="5" placeholder="Your Message"></textarea>
          </div>
          <button type="submit" class="btn btn-success w-100">Send Message</button>
        </form>
      </div>
    </div>

  </div>



 
</body>
</html>
