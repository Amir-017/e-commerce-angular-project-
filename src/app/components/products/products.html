<section class="products-section py-4 py-md-5">
  <div class="container">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-3 mb-4">
      <div>
        <h2 class="mb-1 fw-bold">All products</h2>
        <p class="text-body-secondary mb-0">Browse our latest watches with real-time stock status.</p>
      </div>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
      @for (item of products; track item.id) {
      <div class="col">
        <article class="card prod-card h-100">
          <div class="prod-media">

            <img
              [src]="item.image"
              class="prod-img"
              [alt]="item.name"
              loading="lazy"
              (mouseenter)="item.name"
            />
            <span
              class="badge prod-stock-badge"
              [ngClass]="item.inStock ? 'text-bg-success' : 'text-bg-danger'"
            >
              {{ item.inStock ? 'In stock' : 'Out of stock' }}
            </span>
          </div>

          <div class="card-body d-flex flex-column">
            <div class="d-flex align-items-start justify-content-between gap-3 mb-2">
              <h5 class="card-title mb-0 prod-title">{{ item.name }}</h5>
              <div class="text-end">
                <span class="prod-price " [class]="item.price<=100 ?'text-success':'text-danger'">${{ item.price }}</span>
                <div class="prod-id text-body-secondary">#{{ item.id }}</div>
              </div>
            </div>

            <p class="card-text text-body-secondary prod-desc mb-3">
              A carefully selected {{ item.name }} with great value and everyday comfort.
            </p>

            <div class="mt-auto d-flex gap-2">
              <button
                class="btn btn-primary flex-grow-1"
                [disabled]="!item.inStock"
              >
                {{ item.inStock ? 'Add to cart' : 'Notify me' }}
              </button>
              <button type="button" class="btn btn-outline-secondary prod-icon-btn" aria-label="Add to wishlist">
                ♡
              </button>
            </div>
          </div>
        </article>
      </div>
      }
    </div>
  </div>
</section>
