<article class="card prod-card h-100">
  <div class="prod-media">
    <ng-content select="[card-image]"></ng-content>
    <span class="badge prod-stock-badge">
      <ng-content select="[card-stock]"></ng-content>
    </span>
  </div>

  <div class="card-body d-flex flex-column">
    <div class="d-flex align-items-start justify-content-between gap-3 mb-2">
      <div>
        <ng-content select="[card-title]"></ng-content>
        <ng-content select="[card-category]"></ng-content>
      </div>

      <div class="text-end">
        <ng-content select="[card-price]"></ng-content>
        <ng-content select="[card-id]"></ng-content>
      </div>
    </div>

    <p class="card-text text-body-secondary prod-desc mb-3">
      <ng-content select="[card-description]"></ng-content>
    </p>

    <div class="mb-3 small text-body-secondary">
      <ng-content select="[card-quantity]"></ng-content>
    </div>

    <div class="mt-auto d-flex gap-2">
      <ng-content select="[card-buttons]"></ng-content>
    </div>
  </div>
</article>
